name: Update Free Games

on:
  schedule:
    - cron: "0 2,14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: node scripts/fetch-gamerpower.js

      - run: |
          git config user.name "free-games-bot"
          git config user.email "bot@example.com"
          git add data/games.json
          git commit -m "update free games" || echo "No changes"
          git push